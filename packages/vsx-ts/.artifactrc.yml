$schema: https://raw.githubusercontent.com/zokugun/artifact/v0.6.0/schemas/v1/package.json

update:
  CHANGELOG.md:
    if_exists: skip

  package.json:
    filter:
      - main
      - scripts
      - devDependencies

  .github/**/*.yml:
    if_exists: overwrite

  src/document-manager.ts:
    if_exists: overwrite

  src/extension.ts:
    if_missing: skip
    if_exists: skip

  src/commands/*:
    if_missing: skip
    if_exists: skip

  src/utils/*:
    if_exists: overwrite
