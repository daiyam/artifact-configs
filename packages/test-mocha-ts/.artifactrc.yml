$schema: https://raw.githubusercontent.com/zokugun/artifact/v0.6.0/schemas/v1/package.json

update:
  test/*.ts:
    if_missing: skip
    if_exists: skip

uninstall:
  .mocharc.yml:
    if_exists: remove

  .test:
    if_exists: remove

  .vscode/settings.json:
    if_exists: unmerge

  .xo-config.json:
    if_exists: unmerge

  package.json:
    if_exists: unmerge
