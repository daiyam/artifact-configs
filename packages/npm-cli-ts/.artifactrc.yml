$schema: https://raw.githubusercontent.com/zokugun/artifact/v0.11.0/schemas/v3/package.json

always:
  package.json:
    transforms:
      - description: Remove prepublishOnly from scripts
        jq: 'del(.scripts.prepublishOnly)'

update:
  package.json:
    route:
      $$extend: package
      patch:
        - op: replace
          path: /map(compose)/dependencies/map(sort)
          value:
            map(filter):
              execa:
                if_missing: skip
              trash:
                if_missing: skip
              $$default: primitive

  src/**:
    update: false

variables:
  BINARY_NAME: =package.json.name.split('/').at(-1)
