$schema: https://raw.githubusercontent.com/zokugun/artifact/v0.6.0/schemas/v1/package.json

update:
  package.json:
    route:
      $$extend: package
      patches:
        - op: replace
          path: /map(compose)/devDependencies/map(sort)
          value:
            map(filter):
              '@zokugun/fs-extra-plus':
                if_missing: skip
              '@zokugun/xtry':
                if_missing: skip
              yaml:
                if_missing: skip
              $$default: primitive

  test/*.ts:
    if_missing: skip
    if_exists: skip

  vitest.config.ts:
    if_missing: skip
    if_exists: skip
